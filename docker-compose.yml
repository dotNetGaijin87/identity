# One command to run the whole stack:  docker compose up --build
#
#   db            Postgres
#   backend       Go API + OIDC provider   → http://localhost:8080
#   admin-console React admin SPA (nginx)  → http://localhost:5173   (admin / admin)
#   client        Demo OIDC relying party  → http://localhost:3000   (jdoe / password)
#
# The backend applies its migrations and seeds demo data on startup.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: idp
      POSTGRES_PASSWORD: idp
      POSTGRES_DB: idp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idp"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      # APP_ENV left as 'development' so the session cookie isn't Secure-only (works over http://localhost).
      PORT: "8080"
      DATABASE_URL: postgres://idp:idp@db:5432/idp?sslmode=disable
      CORS_ALLOW_ORIGIN: http://localhost:${WEB_PORT:-5173}
      OIDC_BASE_URL: http://localhost:${BACKEND_PORT:-8080}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  admin-console:
    build: ./admin-console
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy

  client:
    build: ./client
    environment:
      PORT: "3000"
      API_URL: http://backend:8080                          # server-side calls (admin, token, userinfo)
      PUBLIC_BASE: http://localhost:${BACKEND_PORT:-8080}    # browser-facing issuer for redirects
      TENANT: acme
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  # SPA + BFF demo: a React SPA that talks only to its BFF, which runs OIDC
  # auth-code+PKCE and visualizes the live cookie/token state.  → http://localhost:4000
  bff:
    build: ./spa-bff/bff
    environment:
      PORT: "4001"
      API_URL: http://backend:8080                          # server-side calls to the IdP
      PUBLIC_BASE: http://localhost:${BACKEND_PORT:-8080}    # browser-facing issuer for redirects
      PUBLIC_ORIGIN: http://localhost:${SPA_PORT:-4000}      # where the browser reaches the SPA/BFF
      TENANT: acme
    depends_on:
      backend:
        condition: service_healthy

  spa:
    build: ./spa-bff/spa
    ports:
      - "${SPA_PORT:-4000}:80"
    depends_on:
      - bff

volumes:
  pgdata:
