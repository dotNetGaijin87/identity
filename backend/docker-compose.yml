services:
  db:
    image: postgres:16-alpine
    container_name: idp-postgres
    environment:
      POSTGRES_USER: idp
      POSTGRES_PASSWORD: idp
      POSTGRES_DB: idp
    ports:
      - "5432:5432"
    volumes:
      - idp-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idp"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  idp-pgdata:
